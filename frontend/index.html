<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat App - Realtime Messaging</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="toast-container"></div>
    
    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-screen" class="screen glass-panel active">
        <div class="auth-container">
            <h1 class="glow-text">Chat App by Najad</h1>
            <h2 class="glow-text">Welcome Back</h2>
            <p class="subtitle">Log in or sign up to continue</p>
            
            <div class="auth-forms">
                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn primary-btn">Login</button>
                    <p class="toggle-text">Don't have an account? <a href="#" id="go-to-signup">Sign up</a></p>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form">
                    <div class="input-group">
                        <label for="signup-name">Name</label>
                        <input type="text" id="signup-name" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn primary-btn">Sign Up</button>
                    <p class="toggle-text">Already have an account? <a href="#" id="go-to-login">Log in</a></p>
                </form>
            </div>
        </div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chat-screen" class="screen">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <h2 class="glow-text">Rooms</h2>
                <button id="logout-btn" class="btn icon-btn" title="Logout">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
            
            <div class="room-selector">
                <input type="number" id="room-id-input" placeholder="Room ID..." min="1">
                <button id="join-room-btn" class="btn secondary-btn">Join</button>
            </div>
            
            <ul id="rooms-list" class="rooms-list">
                <!-- Room items injected here -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area glass-panel">
            <header class="chat-header">
                <h3 id="active-room-name">Select a Room</h3>
                <span id="connection-status" class="status-indicator"></span>
            </header>
            
            <div id="messages-container" class="messages-container">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" class="empty-icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <p>No messages here yet.<br>Start the conversation!</p>
                </div>
            </div>
            
            <form id="message-form" class="message-input-area">
                <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                <button type="submit" id="send-btn" class="btn send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </main>
    </div>

    <!-- Script loading -->
    <script src="app.js"></script>
</body>
</html>
