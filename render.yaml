services:
  - type: web
    name: chat-app
    env: python
    plan: free # Ensures you use Render's free tier
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # Set your Neon Postgres URL securely in Render Dashboard
      - key: REDIS_URL
        fromService:
          type: redis
          name: chat-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256

  - type: redis
    name: chat-redis
    plan: free # Enjoy Render's 1 free managed Redis database
    ipAllowList: [] # Keep this internal only to Render for security
